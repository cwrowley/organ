<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pieces - Organ Gigs</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Pieces</h1>

        <nav class="nav">
            <a href="index.html" class="btn btn--success btn--lg">← Back to Main</a>
        </nav>
    </header>

    <!-- Search Section -->
    <div class="card">
        <div class="form-field">
            <label for="piece-search">Search pieces</label>
            <input type="text" id="piece-search" class="form-input" placeholder="Type to filter...">
        </div>
    </div>

    <!-- Pieces Table -->
    <table class="table">
        <thead>
            <tr>
                <th>Composer</th>
                <th>Title</th>
                <th>Duration (sec)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="pieces-table-body"></tbody>
    </table>

    <!-- Add Piece Form -->
    <div class="card">
        <div class="card__header">
            <h3 class="card__title">Add Piece</h3>
        </div>
        <form id="add-piece-form" class="form">
            <div class="grid grid--cols-3">
                <div class="form-field">
                    <label for="piece-title">Title</label>
                    <input type="text" id="piece-title" class="form-input" required>
                </div>
                <div class="form-field">
                    <label for="piece-composer">Composer</label>
                    <input type="text" id="piece-composer" list="composer-list" class="form-input" required>
                    <datalist id="composer-list"></datalist>
                </div>
                <div class="form-field">
                    <label for="piece-duration">Duration (seconds)</label>
                    <input type="number" id="piece-duration" class="form-input">
                </div>
            </div>
            <div class="card__actions">
                <button type="submit" class="btn btn--success">Add Piece</button>
            </div>
        </form>
        <small class="text-muted">Press <strong>A</strong> to jump to this form</small>
    </div>

    <!-- Piece Gigs Section -->
    <div class="card">
        <div class="card__header">
            <h3 id="piece-heading" class="card__title">Gigs Featuring This Piece</h3>
        </div>
        <ul id="piece-gigs-list"></ul>
    </div>

    <script src="js/common.js"></script>
    <script src="js/pieces.js"></script>
</body>
</html>
