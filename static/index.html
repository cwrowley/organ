<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organ Gigs</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Organ Gigs</h1>

    <nav class="nav">
        <a href="pieces.html" class="btn btn--success btn--lg">Manage Pieces</a>
    </nav>

    <!-- Churches Section -->
    <section>
        <h2>Churches</h2>
        <table class="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Location</th>
                    <th>Info</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="churches-table-body"></tbody>
        </table>

        <div class="card">
            <div class="card__header">
                <h3 class="card__title">Add Church</h3>
            </div>
            <form id="add-church-form" class="form">
                <div class="grid grid--cols-4">
                    <input type="text" id="church-name" class="form-input" placeholder="Church Name" required>
                    <input type="text" id="church-location" class="form-input" placeholder="Location">
                    <input type="text" id="church-info" class="form-input" placeholder="Info">
                    <button type="submit" class="btn btn--success">Add Church</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="card__header">
                <h3 class="card__title">Add Piece</h3>
            </div>
            <form id="add-piece-form" class="form">
                <div class="grid grid--cols-4">
                    <input type="text" id="piece-title" class="form-input" placeholder="Title" required>
                    <input type="text" id="piece-composer" list="composer-list" class="form-input" placeholder="Composer" required>
                    <input type="number" id="piece-duration" class="form-input" placeholder="Duration (seconds)">
                    <button type="submit" class="btn btn--success">Add Piece</button>
                    <datalist id="composer-list"></datalist>
                </div>
            </form>
        </div>
    </section>

    <!-- Gigs Section -->
    <section>
        <h2>Gigs</h2>
        <div class="gigs-controls">
            <button onclick="fetchGigs()" class="btn btn--primary">Refresh Gigs</button>
            <button id="add-gig-btn" onclick="showAddGigForm()" class="btn btn--success">Add Gig</button>
            <button id="show-all-gigs-btn" onclick="toggleShowAllGigs()" class="btn btn--secondary" style="display: none;">Show All Gigs</button>
        </div>

        <!-- Add Gig Form (initially hidden) -->
        <div id="add-gig-form-container" style="display: none;">
            <div class="card">
                <div class="card__header">
                    <h3 class="card__title">Add New Gig</h3>
                </div>
                <form id="add-gig-form" class="form">
                    <div class="grid grid--cols-3">
                        <div class="form-field">
                            <label for="gig-date">Date</label>
                            <input type="date" id="gig-date" class="form-input" required>
                        </div>

                        <div class="form-field">
                            <label for="gig-church">Church</label>
                            <select id="gig-church" class="form-input" required>
                                <option value="" disabled selected>Select a church</option>
                                <!-- Options will be populated by JavaScript -->
                            </select>
                        </div>

                        <div class="form-field">
                            <label for="gig-fee">Fee</label>
                            <input type="number" id="gig-fee" class="form-input" step="0.01" min="0">
                        </div>
                    </div>

                    <div class="form-pieces-section">
                        <h4>Select Pieces</h4>
                        <div id="gig-pieces-container">
                            <!-- Pieces will be added dynamically -->
                        </div>
                        <button type="button" onclick="addPieceToGig()" class="btn btn--primary">Add Another Piece</button>
                    </div>
                    
                    <div class="card__actions">
                        <button type="submit" class="btn btn--success">Add Gig</button>
                        <button type="button" onclick="hideAddGigForm()" class="btn btn--secondary">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="gigs-container"></div>
        
        <div id="gigs-pagination" class="pagination" style="display: none;">
            <button id="load-more-gigs" onclick="loadMoreGigs()" class="btn btn--primary">Load More Gigs</button>
            <span id="gigs-count-info" class="pagination__info"></span>
        </div>
    </section>

    <script src="js/common.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
