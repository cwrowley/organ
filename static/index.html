<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organ Gigs</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Organ Gigs</h1>

    <h2>Churches</h2>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Location</th>
                <th>Info</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="churches-table-body"></tbody>
    </table>

    <h3>Add Church</h3>
    <form id="add-church-form">
        <input type="text" id="church-name" placeholder="Church Name" required>
        <input type="text" id="church-location" placeholder="Location">
        <input type="text" id="church-info" placeholder="Info">
        <button type="submit">Add Church</button>
    </form>

    <h2>Gigs</h2>
    <button onclick="fetchGigs()">Show All Gigs</button>

    <ul id="gigs-list"></ul>

    <script src="js/common.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
