<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Gig</title>
</head>
<body>
    <h1>Add a New Gig</h1>
    <form onsubmit="event.preventDefault(); addGig();">
        <label for="date">Date:</label>
        <input type="date" id="date" required><br>

        <label for="church">Church:</label>
        <select id="church" required>
            <option value="" disabled selected>Select a church</option>
            <!-- Options will be populated by JavaScript -->
        </select><br>

        <label for="fee">Fee:</label>
        <input type="number" id="fee" required step="0.01"><br>

        <h2>Select Pieces</h2>
        <div id="pieces-container">
            <div class="piece-role-pair">
                <label>Piece 1:</label>
                <select class="piece">
                    <option value="" disabled selected>Select a piece</option>
                    <!-- Options will be populated by JavaScript -->
                </select>
                <select class="role">
                    <option value="" disabled selected>Select a role</option>
                    <!-- Options will be populated by JavaScript -->
                </select><br>
            </div>
        </div>
        <button type="button" onclick="addPiece()">Add Another Piece</button><br>

        <button type="submit">Add Gig</button>
    </form>
    <script src="app.js"></script>
</body>
</html>
<!-- This HTML file allows users to add a new gig by selecting a date, church, fee
